<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitnoor's Digital Space</title>
    <style>
        /* Modern Palette: Deep Teal, Soft Gold, and Off-White */
        :root {
            --primary: #0f4c5c;
            --accent: #e36414;
            --bg-light: #fb850012;
            --text-dark: #222;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            margin: 0;
            color: var(--text-dark);
            scroll-behavior: smooth;
            background-color: #fff;
        }

        /* Navigation */
        nav {
            background: rgba(15, 76, 92, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* Hero/Home Section */
        #home {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f4c5c 0%, #5f0f40 100%);
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        #home h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        /* General Section Styling */
        section {
            padding: 100px 20px;
            max-width: 1000px;
            margin: auto;
        }

        h2 {
            font-size: 2rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 40px;
        }

        /* Unique Image Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        /* Video Styling */
        .video-box {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            background: #000;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Contact Form */
        form {
            background: var(--bg-light);
            padding: 40px;
            border-radius: 20px;
            border-left: 5px solid var(--accent);
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0 20px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            background: var(--accent);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #9a031e;
        }

        /* Footer */
        footer {
            background: #111;
            color: #888;
            text-align: center;
            padding: 50px 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#gallery">Visuals</a>
        <a href="#videos">Watch</a>
        <a href="#contact">Connect</a>
    </nav>

    <section id="home">
        <h1>SITNOOR</h1>
        <p>Student | Creator | Explorer of the Digital Frontier</p>
    </section>

    <section id="gallery">
        <h2>Inspiration Gallery</h2>
        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1550745165-9bc0b252728f?auto=format&fit=crop&w=800&q=80" alt="Retro Tech">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80" alt="Coding Workspace">
            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80" alt="Global Network">
        </div>
    </section>

    <section id="videos">
        <h2>Featured Cinematic</h2>
        <div class="video-box">
            <div class="video-container">
<iframe width="560" height="315" src="https://www.youtube.com/embed/E58qLXBfLrs?si=NIWx1CYK9XgWKZgc" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>            </div>
        </div>
    </section>

    <section id="contact">
        <h2>Get In Touch</h2>
        <form action="#">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="Sitnoor Sample">

            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="hello@example.com">

            <label for="message">Your Message</label>
            <textarea id="message" rows="5" placeholder="What's on your mind?"></textarea>

            <button type="submit">SEND MESSAGE</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Sitnoor. Built with focus and caffeine.</p>
    </footer>

</body>
</html>
